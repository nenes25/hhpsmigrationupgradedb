version: '3.8'

services:
  prestashop:
    image: prestashop/prestashop:${PS_VERSION:-8.1}
    container_name: ps_${PS_VERSION}_hhpsmigrationupgradedb
    ports:
      - "${PS_PORT:-8080}:80"
    environment:
      - DB_SERVER=mysql
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWD=${MYSQL_PASSWORD}
      - PS_INSTALL_AUTO=1
      - PS_DOMAIN=localhost:${PS_PORT:-8080}
      - PS_DEV_MODE=1
      - PS_ENABLE_SSL=0
      - XDEBUG_MODE=debug
      - XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003
    volumes:
      - ./:/var/www/html/modules/hhpsmigrationupgradedb
      - ps-data-${PS_VERSION:-8.1}:/var/www/html
    depends_on:
      - mysql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - prestashop-network

  mysql:
    image: mysql:8.0
    container_name: ps_mysql_${PS_VERSION}
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql-data-${PS_VERSION:-8.1}:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - prestashop-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ps_phpmyadmin_${PS_VERSION}
    environment:
      - PMA_HOST=mysql
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "${PMA_PORT:-8081}:80"
    depends_on:
      - mysql
    networks:
      - prestashop-network

volumes:
  ps-data-${PS_VERSION:-8.1}:
  mysql-data-${PS_VERSION:-8.1}:

networks:
  prestashop-network:
    driver: bridge
